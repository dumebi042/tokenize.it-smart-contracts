name: scanERC2771ForMsgSender

on: [push]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v1
        with:
          node-version: 16.x
      # Contracts that inherit ERC2771Context(Upgradeable) must use _msgSender()/_msgData() instead of msg.sender/msg.data.
      # The list is derived dynamically so newly added ERC2771 contracts are automatically covered.
      - run: |
          files=$(grep -rl 'ERC2771Context' contracts/)
          test "$(echo "$files" | xargs grep 'msg\.sender' | wc -l)" -eq 0
          test "$(echo "$files" | xargs grep 'msg\.data' | wc -l)" -eq 0
